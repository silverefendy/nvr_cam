# Konfigurasi semua kamera
# Salin file ini dan sesuaikan IP dan credential kamera

cameras:
  - id: "cam_01"
    name: "Pintu Masuk Utama"
    location: "Pabrik - Gerbang A"
    rtsp_main: "rtsp://admin:PASSWORD@192.168.1.101:554/cam/realmonitor?channel=1&subtype=0"
    rtsp_sub:  "rtsp://admin:PASSWORD@192.168.1.101:554/cam/realmonitor?channel=1&subtype=1"
    storage_drive: "/mnt/driveE"
    motion_enabled: true
    retention_days: 30
    sort_order: 1
    config_json:
      motion_zones:
        - name: "area_gerbang"
          coords: [[0, 200], [640, 200], [640, 480], [0, 480]]
          sensitivity: 1.5

  - id: "cam_02"
    name: "Parkiran"
    location: "Pabrik - Area Parkir"
    rtsp_main: "rtsp://admin:PASSWORD@192.168.1.102:554/cam/realmonitor?channel=1&subtype=0"
    rtsp_sub:  "rtsp://admin:PASSWORD@192.168.1.102:554/cam/realmonitor?channel=1&subtype=1"
    storage_drive: "/mnt/driveE"
    motion_enabled: false
    retention_days: 14
    sort_order: 2
    config_json: null

  # Tambahkan kamera lain di bawah dengan pola yang sama...
  # cam_03 sampai cam_30
