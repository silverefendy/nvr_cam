services:
  db:
    image: postgres:16-alpine
    container_name: cctv_db
    environment:
      POSTGRES_USER: ${DB_USER:-nvr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword123}
      POSTGRES_DB: ${DB_NAME:-nvr_cam}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nvr_user} -d ${DB_NAME:-nvr_cam}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cctv_api
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-nvr_user}:${DB_PASSWORD:-devpassword123}@db:5432/${DB_NAME:-nvr_cam}
    volumes:
      - ./config:/app/config:ro
      - hls_data:/var/lib/nvr_cam/hls
      - snapshot_data:/var/lib/nvr_cam/snapshots
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.frontend.prod
    container_name: cctv_web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  hls_data:
  snapshot_data:
